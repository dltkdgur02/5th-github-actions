name: Welcome Team Member
run-name: "새 팀원 환영 - 실행자: {github.actor 표현식 사용}"
on:
  workflow_dispatch

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: 환영 인사 시작
        run: echo "=== 환영합니다! ==="

      - name: 환영 인사 출력
        run: |
          echo "오늘은 당신의 첫 출근일입니다"
          echo "프로젝트: GitHub Actions 학습"
          echo "팀: DevOps"
          echo "Runner OS: Linux"

      - name: 환영 인사 마무리
        run: echo "=== 행운을 빕니다! ==="
